<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #43e97b, #38f9d7);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .register-container {
        background: #fff;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        width: 320px;
    }

    .register-container h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    .form-group {
        margin-bottom: 15px;
    }

    label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }

    input, select {
        width: 100%;
        padding: 8px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    input:focus, select:focus {
        outline: none;
        border-color: #43e97b;
    }

    button {
        width: 100%;
        padding: 10px;
        background: #43e97b;
        border: none;
        color: white;
        font-size: 16px;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: #2fd46a;
    }

    .footer {
        text-align: center;
        margin-top: 12px;
        font-size: 12px;
        color: #777;
    }

    .login-link {
        text-align: center;
        margin-top: 10px;
    }

    .login-link a {
        text-decoration: none;
        color: #43e97b;
        font-weight: bold;
    }
</style>

</head>

<body>

<div class="register-container">
    <h2>Create Account</h2>

    <form method="post" action="/register">
        
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <div class="form-group">
            <label>Role</label>
            <select name="role">
                <option value="USER">User</option>
                <option value="ADMIN">Admin</option>
            </select>
        </div>

        <button type="submit">Register</button>

    </form>

    <div class="login-link">
        <p>Already have an account? <a href="/login">Login</a></p>
    </div>

    <div class="footer">
        © 2026 YourApp
    </div>
</div>

</body>
</html>
