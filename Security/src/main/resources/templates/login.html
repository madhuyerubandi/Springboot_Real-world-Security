<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .login-container {
        background: #fff;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        width: 300px;
    }

    .login-container h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    .form-group {
        margin-bottom: 15px;
    }

    label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }

    input {
        width: 100%;
        padding: 8px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    input:focus {
        outline: none;
        border-color: #4facfe;
    }

    button {
        width: 100%;
        padding: 10px;
        background: #4facfe;
        border: none;
        color: white;
        font-size: 16px;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: #00c6ff;
    }

    .footer {
        text-align: center;
        margin-top: 10px;
        font-size: 12px;
        color: #777;
    }
</style>

</head>

<body>

<div class="login-container">
    <h2>Login</h2>

    <form method="post" action="/login">
        
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required/>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required/>
        </div>

        <button type="submit">Login</button>
       <div class="register-link">
    <p>Don't have an account? <a href="/register">Register here</a></p>
</div>
    </form>

    <div class="footer">
        © 2026 security
    </div>
</div>

</body>
</html>
